name: Build Litmanger Standalone

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller cryptography

      - name: Build standalone
        run: python build_exe.py

      - name: Package (zip)
        shell: bash
        run: |
          cd dist/Litmanger
          zip -r ../../litmanger-${{ matrix.name }}.zip ./*
          cd ../..
          ls -lh litmanger-${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: litmanger-${{ matrix.name }}
          path: litmanger-${{ matrix.name }}.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: litmanger-${{ matrix.name }}.zip
