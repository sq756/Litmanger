name: Build Litmanger Standalone

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller cryptography ruff pytest
          pip install -e .

      - name: Lint with ruff
        run: |
          ruff check . --fix
          ruff format .
          ruff check .

      - name: Run tests
        run: pytest -v

      - name: Build standalone
        run: python build_exe.py

      - name: Rename for release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          if [ "${{ matrix.name }}" = "windows" ]; then
            cp dist/Litmanger.exe litmanger-windows.exe
            echo "ASSET=litmanger-windows.exe" >> $GITHUB_ENV
          elif [ "${{ matrix.name }}" = "macos" ]; then
            cp dist/Litmanger litmanger-macos
            echo "ASSET=litmanger-macos" >> $GITHUB_ENV
          else
            cp dist/Litmanger litmanger-linux
            echo "ASSET=litmanger-linux" >> $GITHUB_ENV
          fi

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
