name: Build Litmanger Standalone

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller cryptography

      - name: Build standalone
        run: python build_exe.py

      - name: Package (zip)
        shell: bash
        run: |
          cd dist/Litmanger
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            zip -r ../../litmanger-${{ matrix.name }}.zip ./*
          else
            zip -r ../../litmanger-${{ matrix.name }}.zip ./*
          fi
          cd ../..
          ls -lh litmanger-${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: litmanger-${{ matrix.name }}
          path: litmanger-${{ matrix.name }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: pkgs

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Litmanger ${{ github.ref_name }}
          body: |
            ## Litmanger ${{ github.ref_name }}

            Standalone executables — no Python required. Just download and run.

            | Platform | Download |
            |----------|----------|
            | Windows | `litmanger-windows.zip` — unzip, double-click `start.bat` |
            | macOS | `litmanger-macos.zip` — unzip, run `./start.sh` |
            | Linux | `litmanger-linux.zip` — unzip, run `./start.sh` |

            Opens http://127.0.0.1:8766 automatically.
          files: |
            pkgs/litmanger-windows/litmanger-windows.zip
            pkgs/litmanger-macos/litmanger-macos.zip
            pkgs/litmanger-linux/litmanger-linux.zip
          draft: false
          prerelease: false
