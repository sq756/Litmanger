<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>LitManager</title>
<style>
:root{--bg:#f0f1f5;--p:#fff;--t:#1a1a2e;--t2:#666;--a:#4f46e5;--a2:#7c3aed;--b:#e2e4e9;--h:#f5f5fa;--r:6px}
.dark{--bg:#1a1a2e;--p:#252540;--t:#e0e0e8;--t2:#999;--a:#818cf8;--a2:#a78bfa;--b:#3a3a55;--h:#2a2a45}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--t);height:100vh;overflow:hidden;user-select:none}
#app{display:flex;height:100vh}
#left{width:320px;min-width:200px;background:var(--p);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#center{flex:1;min-width:280px;background:var(--p);display:flex;flex-direction:column;overflow:hidden}
#right{width:380px;min-width:200px;background:var(--p);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.grip{width:4px;cursor:col-resize;flex-shrink:0;background:transparent;transition:background .15s}.grip:hover,.grip.on{background:var(--a)}
.ph{padding:.75rem 1rem;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:.5rem;font-weight:600;font-size:.85rem;min-height:48px;flex-shrink:0}
.pb{flex:1;overflow-y:auto;padding:.5rem}
.btn{padding:.4rem .75rem;border:none;border-radius:var(--r);font-size:.78rem;cursor:pointer;font-weight:500;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:.3rem}
.btn-p{background:var(--a);color:#fff}.btn-p:hover{background:var(--a2)}
.btn-o{background:transparent;color:var(--a);border:1px solid var(--b)}.btn-o:hover{background:var(--h)}
.btn-s{padding:.25rem .5rem;font-size:.72rem}
input,textarea{font-family:inherit;outline:none;background:var(--p);color:var(--t);border:1px solid var(--b)}
input:focus,textarea:focus{border-color:var(--a)}
.srch{width:100%;padding:.5rem .75rem;border-radius:var(--r);font-size:.82rem;background:var(--bg)}
.add-bar{display:flex;gap:.35rem;padding:.5rem}
.add-bar input{flex:1;padding:.4rem .6rem;border-radius:var(--r);font-size:.78rem}
.pitem{padding:.6rem .75rem;border-radius:var(--r);cursor:pointer;transition:background .12s;border:1px solid transparent;margin-bottom:2px}
.pitem:hover{background:var(--h)}.pitem.sel{background:#eef2ff;border-color:var(--a)}
.dark .pitem.sel{background:#2a2a55}
.pitem .tl{font-size:.82rem;font-weight:600;line-height:1.35;margin-bottom:.2rem}
.pitem .mt{font-size:.7rem;color:var(--t2)}
.tag{display:inline-block;padding:.1rem .4rem;border-radius:10px;font-size:.65rem;background:#eef2ff;color:var(--a);margin-right:.2rem;cursor:pointer}
.dark .tag{background:#3a3a60}
.tag .del{margin-left:3px;opacity:.5;font-weight:700}.tag .del:hover{opacity:1;color:#ef4444}
.tag-add{display:inline-block;padding:.1rem .4rem;border-radius:10px;font-size:.65rem;border:1px dashed var(--b);color:var(--t2);cursor:pointer;margin-right:.2rem}
.ctb{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;border-bottom:1px solid var(--b);min-height:40px;flex-shrink:0}
.cc{flex:1;overflow-y:auto;padding:1.5rem}
.dt{font-size:1.3rem;font-weight:700;line-height:1.4;margin-bottom:.5rem}
.dm{font-size:.85rem;color:var(--t2);margin-bottom:1rem;line-height:1.6}
.da{font-size:.9rem;line-height:1.7;color:var(--t);margin-bottom:1.5rem;white-space:pre-wrap}
.bb{background:var(--bg);border-radius:var(--r);padding:.75rem;font-family:monospace;font-size:.75rem;white-space:pre-wrap;overflow-x:auto;max-height:200px;overflow-y:auto}
.ec{display:flex;align-items:center;justify-content:center;height:100%;color:var(--t2);font-size:.9rem;flex-direction:column;gap:.5rem}
.chat-msgs{flex:1;overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:.5rem}
.msg{max-width:90%;padding:.5rem .75rem;border-radius:var(--r);font-size:.82rem;line-height:1.55;word-break:break-word}
.msg.u{align-self:flex-end;background:var(--a);color:#fff}
.msg.a{align-self:flex-start;background:var(--bg);color:var(--t)}
.dark .msg.a{background:#3a3a55}
.chat-inp{padding:.5rem;border-top:1px solid var(--b);flex-shrink:0;display:flex;gap:.35rem}
.chat-inp textarea{flex:1;resize:none;padding:.5rem;border-radius:var(--r);font-size:.82rem;min-height:36px;max-height:100px}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a2e;color:#fff;padding:.7rem 1.2rem;border-radius:6px;font-size:.85rem;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;max-width:360px}
.toast.on{opacity:1;transform:translateY(0)}
.stats-bar{display:flex;gap:1.5rem;padding:.4rem .75rem;font-size:.7rem;color:var(--t2);border-bottom:1px solid var(--b);flex-shrink:0;overflow-x:auto}
.batch-area{display:flex;flex-direction:column;gap:.35rem;padding:.5rem}
.batch-area textarea{width:100%;min-height:80px;padding:.5rem;border-radius:var(--r);font-size:.75rem;resize:vertical}
.note-edit{width:100%;min-height:60px;padding:.5rem;border-radius:var(--r);font-size:.82rem;margin-top:.5rem;resize:vertical}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.menu-item{padding:.5rem .75rem;font-size:.78rem;cursor:pointer;white-space:nowrap;transition:background .12s}.menu-item:hover{background:var(--h)}
.cmt-section{border-top:1px solid var(--b);flex-shrink:0;max-height:40%;display:flex;flex-direction:column}
.cmt-header{padding:.5rem .75rem;font-size:.75rem;font-weight:600;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:.35rem;flex-shrink:0}
.cmt-list{flex:1;overflow-y:auto;padding:.5rem .75rem;font-size:.78rem}
.cmt{background:var(--bg);border-radius:var(--r);padding:.4rem .6rem;margin-bottom:.35rem;line-height:1.4}
.cmt .cmt-author{font-weight:600;font-size:.72rem;color:var(--a)}
.cmt .cmt-time{font-size:.65rem;color:var(--t2);margin-left:.4rem}
.cmt .cmt-text{font-size:.76rem;margin-top:.15rem}
.cmt-inp{display:flex;gap:.25rem;padding:.35rem .5rem;border-top:1px solid var(--b);flex-shrink:0}
.cmt-inp input{flex:1;padding:.3rem .4rem;border-radius:var(--r);font-size:.72rem}
.cmt-inp .name-inp{width:80px;flex:none}
.sort-row{display:flex;gap:.3rem;padding:0 .5rem .35rem}
.sort-row select{padding:.25rem .35rem;border-radius:var(--r);font-size:.7rem;background:var(--bg);color:var(--t2);border:1px solid var(--b);outline:none;cursor:pointer}
.theme-panel{display:none;padding:.5rem;border-bottom:1px solid var(--b);flex-shrink:0}
.theme-panel .row{display:flex;gap:.3rem;align-items:center;margin-bottom:.3rem;font-size:.72rem}
.theme-panel .row label{width:55px;color:var(--t2);flex-shrink:0}
.theme-panel .row input[type=range]{flex:1;height:4px;cursor:pointer;accent-color:var(--a)}
.theme-panel .row input[type=color]{width:28px;height:22px;border:none;padding:0;cursor:pointer;border-radius:3px}
.theme-panel .row input[type=text]{flex:1;padding:.2rem .35rem;border-radius:3px;font-size:.7rem}
.theme-presets{display:flex;gap:.25rem;flex-wrap:wrap;margin-bottom:.4rem}
.theme-presets span{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.theme-presets span.on{border-color:var(--a);transform:scale(1.15)}
#bgVideo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2;pointer-events:none}
#bgOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none}
</style></head>
<body>
<div id="bgVideo"></div><div id="bgOverlay"></div>
<div id="app">
<div id="left">
<div class="ph"><span>LitManager</span><span style="flex:1"></span>
<div class="menu-wrap" style="position:relative"><button class="btn btn-o btn-s" onclick="toggleMenu(event)">Menu</button>
<div class="menu-drop" id="menuDrop" style="display:none;position:absolute;top:100%;right:0;background:var(--p);border:1px solid var(--b);border-radius:var(--r);z-index:100;min-width:180px;box-shadow:0 4px 12px rgba(0,0,0,.1)">
<div class="menu-item" onclick="exportAllBibtex();toggleMenu()">Export BibTeX</div>
<div class="menu-item" onclick="exportAllJson();toggleMenu()">Export JSON</div>
<div class="menu-item" onclick="downloadAllPdfs();toggleMenu()">Download All PDFs</div>
<div class="menu-item" onclick="generateHtml();toggleMenu()">Static HTML</div>
<div style="border-top:1px solid var(--b)"></div>
<div class="menu-item" onclick="if(confirm('Refresh?')){loadPapers();updateStats()};toggleMenu()">Refresh</div>
</div></div>
<button class="btn btn-o btn-s" onclick="toggleDark()" title="Dark mode">&#x25D1;</button>
<button class="btn btn-o btn-s" onclick="toggleTheme()" title="Theme">&#x1F3A8;</button>
<button class="btn btn-o btn-s" onclick="toggleBatch()" title="Batch">+B</button></div>
<div class="stats-bar" id="statsBar"></div>

<div class="theme-panel" id="themePanel">
<div class="theme-presets" id="themePresets"></div>
<div class="row"><label>Accent</label><input type="color" id="tAccent" value="#4f46e5" onchange="applyTheme()"></div>
<div class="row"><label>Opacity</label><input type="range" id="tOpacity" min="20" max="100" value="100" oninput="applyTheme()"><span style="font-size:.65rem;width:30px;text-align:right" id="tOpacityVal">100%</span></div>
<div class="row"><label>Blur</label><input type="range" id="tBlur" min="0" max="30" value="0" oninput="applyTheme()"><span style="font-size:.65rem;width:30px;text-align:right" id="tBlurVal">0px</span></div>
<div class="row"><label>BG Image</label><input type="text" id="tBgUrl" placeholder="Image URL or video file..." onchange="applyTheme()"><button class="btn btn-o btn-s" onclick="document.getElementById('tBgFile').click()" style="font-size:.65rem">...</button><input type="file" id="tBgFile" accept="image/*,video/*" style="display:none" onchange="loadBgFile()"></div>
</div>
<div class="add-bar"><input type="text" id="addUrl" placeholder="Paste DOI or URL..." onkeydown="if(event.key==='Enter')addPaper(event)"><button class="btn btn-p btn-s" onclick="addPaper(event)">Add</button></div>
<div id="batchPanel" style="display:none;padding:0 .5rem .5rem"><div class="batch-area"><textarea id="batchInput" placeholder="Paste multiple DOIs/URLs, one per line..."></textarea><button class="btn btn-p btn-s" onclick="batchImport()">Import All</button></div></div>
<div class="sort-row">
<select id="sortBy" onchange="renderPapers()">
<option value="added">Added (newest)</option>
<option value="added-asc">Added (oldest)</option>
<option value="year">Year (newest)</option>
<option value="year-asc">Year (oldest)</option>
<option value="title">Title A-Z</option>
<option value="title-desc">Title Z-A</option>
<option value="author">First Author</option>
<option value="journal">Journal</option>
</select>
<input type="text" class="srch" id="searchBox" placeholder="Filter... (press /)" oninput="renderPapers()" style="flex:1">
</div>
<div class="pb" id="paperList"><div class="ec">Loading...</div></div>
</div>
<div class="grip" id="gripL"></div>
<div id="center"><div class="ctb" id="centerToolbar"><span style="color:var(--t2);font-size:.82rem">Select a paper</span></div><div class="cc" id="centerContent"><div class="ec">Select a paper to view details</div></div></div>
<div class="grip" id="gripR"></div>
<div id="right"><div class="ph"><span>AI Chat</span><button class="btn btn-o btn-s" id="askPaperBtn" onclick="askAboutPaper()" style="display:none">Ask Paper</button><button class="btn btn-p btn-s" id="configBtn" onclick="toggleConfig()" style="margin-left:auto">Settings</button></div>
<div id="configPanel" style="display:none;padding:.5rem">
<div style="display:flex;gap:.35rem;align-items:center;margin-bottom:.35rem"><span style="width:40px;font-size:.75rem">URL</span><input id="cfgUrl" placeholder="https://api.deepseek.com/v1" style="flex:1;padding:.3rem .5rem;border-radius:4px;font-size:.75rem"></div>
<div style="display:flex;gap:.35rem;align-items:center;margin-bottom:.35rem"><span style="width:40px;font-size:.75rem">Key</span><input type="password" id="cfgKey" placeholder="sk-..." style="flex:1;padding:.3rem .5rem;border-radius:4px;font-size:.75rem"></div>
<div style="display:flex;gap:.35rem;align-items:center;margin-bottom:.35rem"><span style="width:40px;font-size:.75rem">Model</span><select id="cfgModel" style="flex:1;padding:.3rem .5rem;border-radius:4px;font-size:.75rem;background:var(--p);color:var(--t);border:1px solid var(--b)"><option value="deepseek-chat">deepseek-chat</option></select><button class="btn btn-o btn-s" id="fetchModelsBtn" onclick="fetchModels()" title="Auto-detect models from API">&#8635;</button></div>
<div style="display:flex;gap:.35rem;align-items:center;margin-bottom:.5rem"><span style="width:40px;font-size:.75rem">Relay</span><input id="cfgRelay" placeholder="Relay server URL" style="flex:1;padding:.3rem .5rem;border-radius:4px;font-size:.75rem"></div>
<div style="display:flex;gap:.35rem"><button class="btn btn-p btn-s" onclick="saveConfig()">Save</button><button class="btn btn-o btn-s" onclick="toggleConfig()">Cancel</button></div></div>
<div class="chat-msgs" id="chatMessages"><div class="ec">Configure API in Settings</div></div>
<div class="chat-inp"><textarea id="chatInput" placeholder="Ask anything..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat(event)}"></textarea><button class="btn btn-p btn-s" onclick="sendChat(event)">Send</button></div>
<div class="cmt-section" id="commentsSection" style="display:none">
<div class="cmt-header" onclick="toggleComments()"><span id="cmtToggle">&#9654;</span> Comments <span id="cmtCount" style="font-weight:400"></span><span style="flex:1"></span><span class="cmt-mode" id="cmtMode" style="font-size:.65rem;color:var(--t2)">local</span></div>
<div class="cmt-list" id="cmtList"></div>
<div class="cmt-inp"><input class="name-inp" id="cmtName" placeholder="Name"><input id="cmtText" placeholder="Add a comment..."><button class="btn btn-p btn-s" onclick="postComment()">Post</button></div>
</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
var PAPERS=[],selectedId=null,chatMsgs=[],cfg={base_url:'',api_key:'',model:'deepseek-chat'};
var cmtsShown=false,cmtsCache={};

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('on')},4000);
}

async function loadPapers(){
  try{var r=await fetch('/api/papers');PAPERS=await r.json();renderPapers();updateStats()}catch(e){
    document.getElementById('paperList').innerHTML='<div class="ec" style="color:#ef4444">Failed to load papers: '+e.message+'</div>';
  }
}

async function loadConfig(){
  try{var r=await fetch('/api/config');cfg=await r.json();document.getElementById('cfgUrl').value=cfg.base_url||'';
    setModelSelect(cfg.model||'deepseek-chat');
    var saved=localStorage.getItem('litmanager_apikey');
    if(saved){try{cfg.api_key=atob(saved);document.getElementById('cfgKey').value=cfg.api_key}catch(e){}}
    var relay=localStorage.getItem('litmanager_relay');
    if(relay){document.getElementById('cfgRelay').value=relay}
  }catch(e){}
}

function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('litmanager_dark',document.body.classList.contains('dark')?'1':'0')}
if(localStorage.getItem('litmanager_dark')==='1')document.body.classList.add('dark');

function updateStats(){
  if(!PAPERS.length){document.getElementById('statsBar').innerHTML='';return}
  var pdfs=PAPERS.filter(function(p){return p.pdf_downloaded}).length;
  var years=PAPERS.map(function(p){return parseInt(p.year)||0}).filter(function(y){return y>0});
  var yr=years.length?Math.min.apply(null,years)+'-'+Math.max.apply(null,years):'N/A';
  var journals={};PAPERS.forEach(function(p){var j=p.journal||'Unknown';journals[j]=(journals[j]||0)+1});
  var topJ=Object.keys(journals).sort(function(a,b){return journals[b]-journals[a]}).slice(0,2).join(', ');
  var tags={};PAPERS.forEach(function(p){(p.tags||[]).forEach(function(t){tags[t]=(tags[t]||0)+1})});
  var topT=Object.keys(tags).sort(function(a,b){return tags[b]-tags[a]}).slice(0,3).join(', ');
  document.getElementById('statsBar').innerHTML=pdfs+'/'+PAPERS.length+' PDFs | '+yr+' | '+topJ+' | '+topT;
}

function toggleBatch(){var p=document.getElementById('batchPanel');p.style.display=p.style.display==='none'?'block':'none'}

async function batchImport(){
  var txt=document.getElementById('batchInput').value.trim();if(!txt)return;
  var urls=txt.split('\n').filter(function(l){return l.trim()});
  toast('Importing '+urls.length+' papers...');var ok=0,err=0;
  for(var i=0;i<urls.length;i++){
    try{var r=await fetch('/api/papers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:urls[i].trim()})});var d=await r.json();if(d.ok)ok++;else err++}catch(e){err++}
  }
  toast('Done: '+ok+' added, '+err+' failed');
  document.getElementById('batchInput').value='';document.getElementById('batchPanel').style.display='none';
  await loadPapers();
}

function renderPapers(){
  var q=(document.getElementById('searchBox').value||'').toLowerCase();
  var sortBy=document.getElementById('sortBy').value;
  var list=document.getElementById('paperList');if(!list)return;
  var filtered=PAPERS.slice();
  if(q){filtered=filtered.filter(function(p){var h=[p.title,p.journal,(p.authors||[]).join(' '),(p.tags||[]).join(' '),p.doi||'',p.notes||'',p.abstract||''].join(' ').toLowerCase();return h.indexOf(q)>=0})}
  // Sort
  var sortMap={
    'added':function(a,b){return (b.added||'')>(a.added||'')?1:-1},
    'added-asc':function(a,b){return (a.added||'')>(b.added||'')?1:-1},
    'year':function(a,b){return (parseInt(b.year)||0)-(parseInt(a.year)||0)},
    'year-asc':function(a,b){return (parseInt(a.year)||0)-(parseInt(b.year)||0)},
    'title':function(a,b){return (a.title||'').localeCompare(b.title||'')},
    'title-desc':function(a,b){return (b.title||'').localeCompare(a.title||'')},
    'author':function(a,b){var aa=(a.authors||[])[0]||'';var ba=(b.authors||[])[0]||'';return aa.localeCompare(ba)},
    'journal':function(a,b){var ja=a.journal||'';var jb=b.journal||'';var ya=parseInt(a.year)||0;var yb=parseInt(b.year)||0;return ja===jb?yb-ya:ja.localeCompare(jb)}
  };
  if(sortMap[sortBy])filtered.sort(sortMap[sortBy]);
  if(!filtered.length){list.innerHTML='<div class="ec">No papers found</div>';return}
  var html='';
  for(var i=0;i<filtered.length;i++){
    var p=filtered[i],sel=p.id===selectedId?' sel':'';
    var authors=(p.authors||[]).slice(0,2).join(', ');if((p.authors||[]).length>2)authors+=' et al.';
    html+='<div class="pitem'+sel+'" onclick="selectPaper(\''+p.id+'\')"><div class="tl">'+esc(p.title||'Unknown')+'</div><div class="mt"><span>'+esc(authors||'Unknown')+'</span> '+(p.year?'<span>'+p.year+'</span>':'')+'</div>';
    if((p.tags||[]).length){html+='<div style="margin-top:.2rem">';for(var j=0;j<p.tags.length;j++)html+='<span class="tag">'+esc(p.tags[j])+'</span>';html+='</div>'}
    if(p.notes)html+='<div style="font-size:.68rem;color:var(--t2);margin-top:.15rem">'+esc(p.notes.substring(0,80))+'</div>';
    html+='</div>';
  }
  list.innerHTML=html;
}

function getPaper(id){for(var i=0;i<PAPERS.length;i++)if(PAPERS[i].id===id)return PAPERS[i];return null}

function selectPaper(id){
  selectedId=id;renderPapers();var p=getPaper(id);if(!p)return;
  var tb=document.getElementById('centerToolbar');
  tb.innerHTML='<span style="font-weight:600">'+esc(p.title?p.title.substring(0,60)+'...':'')+'</span><span style="flex:1"></span><button class="btn btn-o btn-s" onclick="exportPaper(\''+p.id+'\')">Export</button><button class="btn btn-o btn-s" onclick="deletePaper(\''+p.id+'\')">Delete</button>';
  var c='<div class="dt">'+esc(p.title)+'</div>';
  c+='<div class="dm"><b>Authors:</b> '+(p.authors||[]).join(', ')+'<br>';
  if(p.journal)c+='<b>Journal:</b> '+esc(p.journal);if(p.year)c+=' ('+p.year+')';
  if(p.volume)c+=' Vol.'+p.volume;if(p.pages)c+=', pp.'+p.pages;c+='<br>';
  if(p.doi)c+='<b>DOI:</b> <a href="https://doi.org/'+p.doi+'" target="_blank" style="color:var(--a)">'+esc(p.doi)+'</a><br>';
  if(p.arxiv_id)c+='<b>arXiv:</b> '+esc(p.arxiv_id)+'<br>';
  c+='<b>Added:</b> '+(p.added||'N/A');
  if(p.pdf_local)c+='<br><b>Local PDF:</b> <code style="font-size:.75rem">'+esc(p.pdf_local)+'</code>';
  c+='</div>';
  c+='<div style="margin-bottom:1rem"><b style="font-size:.82rem">Tags:</b> <div style="display:inline-flex;flex-wrap:wrap;gap:.2rem;margin-top:.25rem">';
  if(p.tags){for(var i=0;i<p.tags.length;i++)c+='<span class="tag">'+esc(p.tags[i])+'<span class="del" onclick="event.stopPropagation();removeTag(\''+p.id+'\',\''+p.tags[i].replace(/'/g,"\\'")+'\')">x</span></span>'}
  c+='<span class="tag-add" onclick="event.stopPropagation();addTag(\''+p.id+'\')">+ tag</span></div></div>';

function getRelayUrl(){return localStorage.getItem('litmanager_relay')||''}
async function loadComments(doi){
  if(!doi){document.getElementById('cmtList').innerHTML='<div style="color:var(--t2);font-size:.75rem">No DOI</div>';return}
  var relay=getRelayUrl();
  document.getElementById('cmtMode').textContent=relay?'relay':'local';

  // Always load local comments first
  var local=[];
  try{var r=await fetch('/api/comments?doi='+encodeURIComponent(doi));local=await r.json()}catch(e){}
  cmtsCache[doi]=local;

  // If relay configured, also fetch from relay
  if(relay){
    try{
      var rr=await fetch(relay.replace(/\/$/,'')+'/comments?doi='+encodeURIComponent(doi));
      var remote=await rr.json();
      // Merge: dedup by id, keep remote comments
      var seen={};
      for(var i=0;i<local.length;i++)seen[local[i].id]=true;
      for(var j=0;j<remote.length;j++){if(!seen[remote[j].id])local.push(remote[j])}
      cmtsCache[doi]=local;
    }catch(e){console.log('Relay fetch failed:',e)}
  }
  renderComments(local);
}

function renderComments(comments){
  var el=document.getElementById('cmtList');
  var count=document.getElementById('cmtCount');
  count.textContent=comments.length?'('+comments.length+')':'';
  if(!comments.length){el.innerHTML='<div style="color:var(--t2);font-size:.75rem">No comments yet. Be the first!</div>';return}
  var html='';
  for(var i=0;i<comments.length;i++){
    var c=comments[i];
    var verified=c.sig?' &#10003;':'';
    html+='<div class="cmt"><span class="cmt-author">'+esc(c.author||'Anonymous')+verified+'</span><span class="cmt-time">'+c.time+'</span><div class="cmt-text">'+esc(c.text)+'</div></div>';
  }
  el.innerHTML=html;
  el.scrollTop=el.scrollHeight;
}

async function postComment(){
  var p=getPaper(selectedId);if(!p||!p.doi){toast('No DOI for this paper');return}
  var author=document.getElementById('cmtName').value.trim()||'Anonymous';
  var text=document.getElementById('cmtText').value.trim();if(!text)return;

  // First save locally
  var d;
  try{
    var r=await fetch('/api/comments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({doi:p.doi,author:author,text:text})});
    d=await r.json();
  }catch(e){toast('Failed: '+e.message);return}
  if(!d.ok){toast('Error: '+d.error);return}

  document.getElementById('cmtText').value='';
  var localList=d.comments;
  var newComment=localList[localList.length-1];

  // If relay configured, sign and send
  var relay=getRelayUrl();
  if(relay){
    try{
      // Sign the comment via server
      var sr=await fetch('/api/sign-comment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(newComment)});
      var signed=await sr.json();
      if(signed.ok){
        // Post to relay
        var rr=await fetch(relay.replace(/\/$/,'')+'/comments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(signed.comment)});
        var rd=await rr.json();
        if(rd.ok){
          cmtsCache[p.doi]=rd.comments;
          renderComments(rd.comments);
          toast('Posted to relay!');
          return;
        }
      }
    }catch(e){console.log('Relay post failed:',e)}
  }

  cmtsCache[p.doi]=localList;
  renderComments(localList);
}

function applyThemeVars(t,dark){
  var r=document.documentElement;
  if(dark){
    r.style.setProperty('--bg',t.dkbg);r.style.setProperty('--p',t.dkp);r.style.setProperty('--t',t.dkt);r.style.setProperty('--t2',t.dkt2);
    r.style.setProperty('--a',t.dka);r.style.setProperty('--a2',t.dka2);r.style.setProperty('--b',t.dkb);r.style.setProperty('--h',t.dkh);
  }else{
    r.style.setProperty('--bg',t.bg);r.style.setProperty('--p',t.p);r.style.setProperty('--t',t.t);r.style.setProperty('--t2',t.t2);
    r.style.setProperty('--a',t.a);r.style.setProperty('--a2',t.a2);r.style.setProperty('--b',t.b);r.style.setProperty('--h',t.h);
  }
  // accent color override
  var acc=document.getElementById('tAccent');
  if(acc&&acc.dataset.set==='1'){
    var cl=acc.value;r.style.setProperty('--a',cl);r.style.setProperty('--a2',cl);
  }
}
function applyTheme(){
  var t=loadTheme();
  var dark=document.body.classList.contains('dark');
  applyThemeVars(t,dark);
  // custom accent override
  var acc=document.getElementById('tAccent');var op=document.getElementById('tOpacity');var bl=document.getElementById('tBlur');
  if(acc&&acc.dataset.set==='1'){applyThemeVars(t,dark)}
  // Background overlay
  applyBgOverlay();
}
function applyBgOverlay(){
  var op=document.getElementById('tOpacity');var bl=document.getElementById('tBlur');var bgUrl=document.getElementById('tBgUrl');
  var overlay=document.getElementById('bgOverlay');
  var v=document.getElementById('tOpacityVal');var b=document.getElementById('tBlurVal');
  if(op)v.textContent=op.value+'%';
  if(bl)b.textContent=bl.value+'px';
  var o=(parseInt(op&&op.value||100)/100).toFixed(2);
  var blur=parseInt(bl&&bl.value||0);
  if(o<1||blur>0){
    overlay.style.display='block';
    overlay.style.background='rgba(255,255,255,'+(1-o)+')';
    overlay.style.backdropFilter='blur('+blur+'px)';
  }else{overlay.style.display='none'}
  if(bgUrl&&bgUrl.value.trim()){
    var url=bgUrl.value.trim();
    if(/\.(mp4|webm|ogg)$/i.test(url)){setBgVideo(url)}
    else{setBgImage(url)}
  }else{clearBg()}
}
function setBgImage(url){
  clearBgVideo();
  document.body.style.backgroundImage='url('+url+')';
  document.body.style.backgroundSize='cover';
  document.body.style.backgroundPosition='center';
  document.body.style.backgroundAttachment='fixed';
}
function setBgVideo(url){
  var v=document.getElementById('bgVideo');
  v.src=url;v.loop=true;v.muted=true;v.autoplay=true;v.playsInline=true;
  v.style.display='block';
  try{v.play()}catch(e){}
  document.body.style.backgroundImage='none';
}
function clearBgVideo(){var v=document.getElementById('bgVideo');v.pause();v.src='';v.style.display='none'}
function clearBg(){clearBgVideo();document.body.style.backgroundImage='';document.querySelectorAll('.panel-bg').forEach(function(el){el.style.opacity=''})}

function loadBgFile(){
  var f=document.getElementById('tBgFile').files[0];if(!f)return;
  var url=URL.createObjectURL(f);
  document.getElementById('tBgUrl').value=url;
  applyTheme();
}
function toggleTheme(){
  var p=document.getElementById('themePanel');
  p.style.display=p.style.display==='none'?'block':'none';
  if(p.style.display==='block')renderThemePresets();
}
function renderThemePresets(){
  var wrap=document.getElementById('themePresets');
  var t=loadTheme();
  var html='';
  for(var i=0;i<THEME_PRESETS.length;i++){
    var pr=THEME_PRESETS[i];
    var on=(pr.name===t.name&&!t.custom)?' on':'';
    html+='<span class="theme-preset'+on+'" style="background:'+pr.a+'" title="'+pr.name+'" onclick="pickPreset('+i+')"></span>';
  }
  wrap.innerHTML=html;
}
function pickPreset(idx){
  var t=THEME_PRESETS[idx];t.custom=false;
  saveTheme(t);document.getElementById('tAccent').dataset.set='0';
  document.getElementById('tAccent').value=t.a;
  document.getElementById('tBgUrl').value='';
  applyTheme();renderThemePresets();
  // persist bg settings separately
  saveBgSettings();
}
function saveBgSettings(){
  var s={bgUrl:document.getElementById('tBgUrl').value,opacity:document.getElementById('tOpacity').value,blur:document.getElementById('tBlur').value,
    accent:document.getElementById('tAccent').value,accentSet:document.getElementById('tAccent').dataset.set};
  localStorage.setItem('litmanager_bg',JSON.stringify(s));
}
function loadBgSettings(){
  var raw=localStorage.getItem('litmanager_bg');
  if(!raw)return;
  try{var s=JSON.parse(raw);
    if(s.bgUrl)document.getElementById('tBgUrl').value=s.bgUrl;
    if(s.opacity)document.getElementById('tOpacity').value=s.opacity;
    if(s.blur)document.getElementById('tBlur').value=s.blur;
    if(s.accent)document.getElementById('tAccent').value=s.accent;
    if(s.accentSet)document.getElementById('tAccent').dataset.set=s.accentSet;
    applyTheme();
  }catch(e){}
}

// Hook accent color change
document.getElementById('tAccent').addEventListener('input',function(){
  this.dataset.set='1';
  applyTheme();
  saveBgSettings();
});
document.getElementById('tOpacity').addEventListener('input',function(){saveBgSettings()});
document.getElementById('tBlur').addEventListener('input',function(){saveBgSettings()});

// Hook dark mode toggle to also apply theme
var _origToggleDark=toggleDark;
toggleDark=function(){
  _origToggleDark();
  applyTheme();
};
// Call theme on load
(function(){
  applyTheme();
  renderThemePresets();
  loadBgSettings();
})();

// === Drag handles ===
(function(){
  var gripL=document.getElementById('gripL'),gripR=document.getElementById('gripR');
  var left=document.getElementById('left'),right=document.getElementById('right');
  var dragging=null,startX=0,startW=0,target=null;

  function onDown(e){
    dragging=e.target;target=e.target===gripL?left:right;
    startX=e.clientX;startW=target.offsetWidth;
    dragging.classList.add('on');document.body.style.cursor='col-resize';
    e.preventDefault();
  }
  function onMove(e){
    if(!dragging)return;
    var dx=e.clientX-startX;
    var newW=target===left?startW+dx:startW-dx;
    newW=Math.max(200,Math.min(newW,window.innerWidth*0.55));
    target.style.width=newW+'px';
  }
  function onUp(){
    if(!dragging)return;
    dragging.classList.remove('on');document.body.style.cursor='';
    dragging=null;target=null;
  }
  gripL.addEventListener('mousedown',onDown);
  gripR.addEventListener('mousedown',onDown);
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
})();

document.addEventListener('keydown',function(e){
  if(e.key==='/'&&document.activeElement===document.body){e.preventDefault();document.getElementById('searchBox').focus()}
});

loadPapers();loadConfig();renderChat();updateStats();
</script>
