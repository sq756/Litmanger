<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>LitManager</title>
<style>
:root{--bg:#f0f1f5;--p:#fff;--t:#1a1a2e;--t2:#666;--a:#4f46e5;--a2:#7c3aed;--b:#e2e4e9;--h:#f5f5fa;--r:6px}
.dark{--bg:#1a1a2e;--p:#252540;--t:#e0e0e8;--t2:#999;--a:#818cf8;--a2:#a78bfa;--b:#3a3a55;--h:#2a2a45}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--t);height:100vh;overflow:hidden;user-select:none}
#app{display:flex;height:100vh}
#left{width:320px;min-width:200px;background:var(--p);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#center{flex:1;min-width:280px;background:var(--p);display:flex;flex-direction:column;overflow:hidden}
#right{width:380px;min-width:200px;background:var(--p);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.grip{width:4px;cursor:col-resize;flex-shrink:0;background:transparent;transition:background .15s}.grip:hover,.grip.on{background:var(--a)}
.ph{padding:.75rem 1rem;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:.5rem;font-weight:600;font-size:.85rem;min-height:48px;flex-shrink:0}
.pb{flex:1;overflow-y:auto;padding:.5rem}
.btn{padding:.4rem .75rem;border:none;border-radius:var(--r);font-size:.78rem;cursor:pointer;font-weight:500;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:.3rem}
.btn-p{background:var(--a);color:#fff}.btn-p:hover{background:var(--a2)}
.btn-o{background:transparent;color:var(--a);border:1px solid var(--b)}.btn-o:hover{background:var(--h)}
.btn-s{padding:.25rem .5rem;font-size:.72rem}
.btn-on{background:var(--a);color:#fff}
input,textarea{font-family:inherit;outline:none;background:var(--p);color:var(--t);border:1px solid var(--b)}
input:focus,textarea:focus{border-color:var(--a)}
.srch{width:100%;padding:.5rem .75rem;border-radius:var(--r);font-size:.82rem;background:var(--bg)}
.add-bar{display:flex;gap:.35rem;padding:.5rem}
.add-bar input{flex:1;padding:.4rem .6rem;border-radius:var(--r);font-size:.78rem}
.pitem{padding:.6rem .75rem;border-radius:var(--r);cursor:pointer;transition:background .12s;border:1px solid transparent;margin-bottom:2px}
.pitem:hover{background:var(--h)}.pitem.sel{background:#eef2ff;border-color:var(--a)}
.dark .pitem.sel{background:#2a2a55}
.pitem .tl{font-size:.82rem;font-weight:600;line-height:1.35;margin-bottom:.2rem}
.pitem .mt{font-size:.7rem;color:var(--t2)}
.tag{display:inline-block;padding:.1rem .4rem;border-radius:10px;font-size:.65rem;background:#eef2ff;color:var(--a);margin-right:.2rem;cursor:pointer}
.dark .tag{background:#3a3a60}
.tag .del{margin-left:3px;opacity:.5;font-weight:700}.tag .del:hover{opacity:1;color:#ef4444}
.tag-add{display:inline-block;padding:.1rem .4rem;border-radius:10px;font-size:.65rem;border:1px dashed var(--b);color:var(--t2);cursor:pointer;margin-right:.2rem}
.ctb{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;border-bottom:1px solid var(--b);min-height:40px;flex-shrink:0}
.cc{flex:1;overflow-y:auto;padding:1.5rem}
.cv{flex:1;display:flex;flex-direction:column;overflow:hidden}
.cv-top{flex:1;min-height:200px;overflow:hidden;border-bottom:2px solid var(--a)}
.cv-top iframe{width:100%;height:100%;border:none;background:#fff}
.cv-bot{flex:1;min-height:150px;display:flex;flex-direction:column;overflow:hidden}
.cv-bot textarea{flex:1;border:none;border-radius:0;padding:.75rem;font-size:.8rem;line-height:1.6;resize:none;font-family:inherit}
.cv-bot .md-preview{flex:1;overflow-y:auto;padding:.75rem;font-size:.82rem;line-height:1.65}
.md-preview h1,.md-preview h2,.md-preview h3{margin:.5rem 0 .3rem}
.md-preview p{margin:.3rem 0}
.md-preview code{background:var(--bg);padding:.1rem .3rem;border-radius:3px;font-size:.78rem}
.md-preview pre{background:var(--bg);padding:.6rem;border-radius:var(--r);overflow-x:auto;font-size:.76rem;margin:.4rem 0}
.md-preview pre code{background:none;padding:0}
.md-preview blockquote{border-left:3px solid var(--a);padding-left:.6rem;color:var(--t2);margin:.4rem 0}
.md-preview table{border-collapse:collapse;width:100%;margin:.4rem 0}
.md-preview td,.md-preview th{border:1px solid var(--b);padding:.25rem .5rem;font-size:.78rem}
.md-view .katex{font-size:1.05em}
.dt{font-size:1.3rem;font-weight:700;line-height:1.4;margin-bottom:.5rem}
.dm{font-size:.85rem;color:var(--t2);margin-bottom:1rem;line-height:1.6}
.da{font-size:.9rem;line-height:1.7;color:var(--t);margin-bottom:1.5rem;white-space:pre-wrap}
.bb{background:var(--bg);border-radius:var(--r);padding:.75rem;font-family:monospace;font-size:.75rem;white-space:pre-wrap;overflow-x:auto;max-height:200px;overflow-y:auto}
.ec{display:flex;align-items:center;justify-content:center;height:100%;color:var(--t2);font-size:.9rem;flex-direction:column;gap:.5rem}
.chat-msgs{flex:1;overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:.5rem}
.msg{max-width:90%;padding:.5rem .75rem;border-radius:var(--r);font-size:.82rem;line-height:1.55;word-break:break-word}
.msg.u{align-self:flex-end;background:var(--a);color:#fff}
.msg.a{align-self:flex-start;background:var(--bg);color:var(--t)}
.dark .msg.a{background:#3a3a55}
.chat-inp{padding:.5rem;border-top:1px solid var(--b);flex-shrink:0;display:flex;gap:.35rem}
.chat-inp textarea{flex:1;resize:none;padding:.5rem;border-radius:var(--r);font-size:.82rem;min-height:36px;max-height:100px}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a2e;color:#fff;padding:.7rem 1.2rem;border-radius:6px;font-size:.85rem;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;max-width:360px}
.toast.on{opacity:1;transform:translateY(0)}
.stats-bar{display:flex;gap:1.5rem;padding:.4rem .75rem;font-size:.7rem;color:var(--t2);border-bottom:1px solid var(--b);flex-shrink:0;overflow-x:auto}
.batch-area{display:flex;flex-direction:column;gap:.35rem;padding:.5rem}
.batch-area textarea{width:100%;min-height:80px;padding:.5rem;border-radius:var(--r);font-size:.75rem;resize:vertical}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.menu-item{padding:.5rem .75rem;font-size:.78rem;cursor:pointer;white-space:nowrap;transition:background .12s}.menu-item:hover{background:var(--h)}

.cmt-section{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.cmt-list{flex:1;overflow-y:auto;padding:.5rem .75rem;font-size:.78rem}
.cmt{background:var(--bg);border-radius:var(--r);padding:.4rem .6rem;margin-bottom:.35rem;line-height:1.4}
.cmt .cmt-author{font-weight:600;font-size:.72rem;color:var(--a)}
.cmt .cmt-time{font-size:.65rem;color:var(--t2);margin-left:.4rem}
.cmt .cmt-text{font-size:.76rem;margin-top:.15rem}
.cmt-inp{display:flex;gap:.25rem;padding:.35rem .5rem;border-top:1px solid var(--b);flex-shrink:0}
.cmt-inp input{flex:1;padding:.3rem .4rem;border-radius:var(--r);font-size:.72rem}
.cmt-inp .name-inp{width:80px;flex:none}

.tabs{display:flex;border-bottom:1px solid var(--b);flex-shrink:0}
.tabs span{padding:.35rem .75rem;font-size:.72rem;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;transition:all .12s}
.tabs span.on{color:var(--a);border-bottom-color:var(--a);font-weight:600}

.sort-row{display:flex;gap:.3rem;padding:0 .5rem .35rem}
.sort-row select{padding:.25rem .35rem;border-radius:var(--r);font-size:.7rem;background:var(--bg);color:var(--t2);border:1px solid var(--b);outline:none;cursor:pointer}
.theme-panel{display:none;padding:.5rem;border-bottom:1px solid var(--b);flex-shrink:0}
.theme-panel .row{display:flex;gap:.3rem;align-items:center;margin-bottom:.3rem;font-size:.72rem}
.theme-panel .row label{width:55px;color:var(--t2);flex-shrink:0}
.theme-panel .row input[type=range]{flex:1;height:4px;cursor:pointer;accent-color:var(--a)}
.theme-panel .row input[type=color]{width:28px;height:22px;border:none;padding:0;cursor:pointer;border-radius:3px}
.theme-panel .row input[type=text]{flex:1;padding:.2rem .35rem;border-radius:3px;font-size:.7rem}
.theme-presets{display:flex;gap:.25rem;flex-wrap:wrap;margin-bottom:.4rem}
.theme-presets span{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.theme-presets span.on{border-color:var(--a);transform:scale(1.15)}
#bgVideo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2;pointer-events:none}
#bgOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
</head>
<body>
<div id="bgVideo"></div><div id="bgOverlay"></div>
<div id="app">
<div id="left">
<div class="ph"><span>LitManager</span><span style="flex:1"></span>
<div class="menu-wrap" style="position:relative"><button class="btn btn-o btn-s" onclick="toggleMenu(event)">Menu</button>
<div class="menu-drop" id="menuDrop" style="display:none;position:absolute;top:100%;right:0;background:var(--p);border:1px solid var(--b);border-radius:var(--r);z-index:100;min-width:180px;box-shadow:0 4px 12px rgba(0,0,0,.1)">
<div class="menu-item" onclick="exportAllBibtex();toggleMenu()">Export BibTeX</div>
<div class="menu-item" onclick="exportAllJson();toggleMenu()">Export JSON</div>
<div class="menu-item" onclick="downloadAllPdfs();toggleMenu()">Download All PDFs</div>
<div class="menu-item" onclick="generateHtml();toggleMenu()">Static HTML</div>
<div class="menu-item" onclick="scanDownloads();toggleMenu()">Auto-Scan PDFs</div>
<div style="border-top:1px solid var(--b)"></div>
<div class="menu-item" onclick="if(confirm('Refresh?')){loadPapers();updateStats()};toggleMenu()">Refresh</div>
</div></div>
<button class="btn btn-o btn-s" onclick="toggleDark()" title="Dark mode">&#x25D1;</button>
<button class="btn btn-o btn-s" onclick="toggleTheme()" title="Theme">&#x1F3A8;</button>
<button class="btn btn-o btn-s" onclick="toggleBatch()" title="Batch">+B</button></div>
<div class="stats-bar" id="statsBar"></div>

<div class="theme-panel" id="themePanel">
<div class="theme-presets" id="themePresets"></div>
<div class="row"><label>Accent</label><input type="color" id="tAccent" value="#4f46e5" onchange="applyTheme()" autocomplete="off"></div>
<div class="row"><label>Opacity</label><input type="range" id="tOpacity" min="20" max="100" value="100" oninput="applyTheme()"><span style="font-size:.65rem;width:30px;text-align:right" id="tOpacityVal">100%</span></div>
<div class="row"><label>Blur</label><input type="range" id="tBlur" min="0" max="30" value="0" oninput="applyTheme()"><span style="font-size:.65rem;width:30px;text-align:right" id="tBlurVal">0px</span></div>
<div class="row"><label>BG Image</label><input type="text" id="tBgUrl" placeholder="Image URL or video file..." onchange="applyTheme()" autocomplete="off"><button class="btn btn-o btn-s" onclick="document.getElementById('tBgFile').click()" style="font-size:.65rem">...</button><input type="file" id="tBgFile" accept="image/*,video/*" style="display:none" onchange="loadBgFile()"></div>
</div>
<div class="add-bar"><input type="text" id="addUrl" placeholder="Paste DOI or URL..." onkeydown="if(event.key==='Enter')addPaper(event)" autocomplete="off"><button class="btn btn-p btn-s" onclick="addPaper(event)">Add</button></div>
<div id="batchPanel" style="display:none;padding:0 .5rem .5rem"><div class="batch-area"><textarea id="batchInput" placeholder="Paste multiple DOIs/URLs, one per line..." autocomplete="off"></textarea><button class="btn btn-p btn-s" onclick="batchImport()">Import All</button></div></div>
<div class="sort-row">
<select id="sortBy" onchange="renderPapers()">
<option value="added">Added (newest)</option><option value="added-asc">Added (oldest)</option>
<option value="year">Year (newest)</option><option value="year-asc">Year (oldest)</option>
<option value="title">Title A-Z</option><option value="title-desc">Title Z-A</option>
<option value="author">First Author</option><option value="journal">Journal</option>
</select>
<input type="text" class="srch" id="searchBox" placeholder="Filter... (press /)" oninput="renderPapers()" autocomplete="off">
</div>
<div class="pb" id="paperList"><div class="ec">Loading...</div></div>
</div>
<div class="grip" id="gripL"></div>
<div id="center"><div class="ctb" id="centerToolbar"><span style="color:var(--t2);font-size:.82rem">Select a paper</span></div>
<div class="cc" id="centerContent"><div class="ec">Select a paper to view details</div></div></div>
<div class="grip" id="gripR"></div>
<div id="right"><div class="ph"><span>AI Chat</span><button class="btn btn-o btn-s" id="askPaperBtn" onclick="askAboutPaper()" style="display:none">Ask Paper</button><button class="btn btn-p btn-s" id="configBtn" onclick="toggleConfig()" style="margin-left:auto">Settings</button></div>

<div id="configPanel" style="display:none;padding:.5rem">
<div style="display:flex;gap:.35rem;align-items:center;margin-bottom:.35rem"><span style="width:40px;font-size:.75rem">URL</span><input id="cfgUrl" placeholder="https://api.deepseek.com/v1" style="flex:1;padding:.3rem .5rem;border-radius:4px;font-size:.75rem" autocomplete="off"></div>
<div style="display:flex;gap:.35rem;align-items:center;margin-bottom:.35rem"><span style="width:40px;font-size:.75rem">Key</span><input type="password" id="cfgKey" placeholder="sk-..." style="flex:1;padding:.3rem .5rem;border-radius:4px;font-size:.75rem" autocomplete="new-password"></div>
<div style="display:flex;gap:.35rem;align-items:center;margin-bottom:.35rem"><span style="width:40px;font-size:.75rem">Model</span><select id="cfgModel" style="flex:1;padding:.3rem .5rem;border-radius:4px;font-size:.75rem;background:var(--p);color:var(--t);border:1px solid var(--b)"><option value="deepseek-chat">deepseek-chat</option></select><button class="btn btn-o btn-s" id="fetchModelsBtn" onclick="fetchModels()" title="Auto-detect models">&#8635;</button></div>
<div style="display:flex;gap:.35rem;align-items:center;margin-bottom:.5rem"><span style="width:40px;font-size:.75rem">Relay</span><input id="cfgRelay" placeholder="Relay server URL" style="flex:1;padding:.3rem .5rem;border-radius:4px;font-size:.75rem" autocomplete="off"></div>
<div style="display:flex;gap:.35rem"><button class="btn btn-p btn-s" onclick="saveConfig()">Save</button><button class="btn btn-o btn-s" onclick="toggleConfig()">Cancel</button></div></div>

<div class="chat-msgs" id="chatMessages"><div class="ec">Configure API in Settings</div></div>
<div class="chat-inp"><textarea id="chatInput" placeholder="Ask anything..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat(event)}" autocomplete="off"></textarea><button class="btn btn-p btn-s" onclick="sendChat(event)">Send</button></div>

<div class="tabs" id="tabsBar" style="display:none">
<span class="on" id="tabMD" onclick="switchTab('md')">Notes (MD)</span>
<span id="tabCmt" onclick="switchTab('cmt')">Comments</span>
</div>

<div id="tabMDContent" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
<textarea id="mdEditor" placeholder="# Notes & Markdown&#10;&#10;Supports **Markdown**, $$LaTeX$$ equations, code blocks, tables...&#10;&#10;Toggle to preview mode to see rendered output." style="flex:1;border:none;border-radius:0;padding:.5rem .75rem;font-size:.76rem;font-family:inherit;resize:none;line-height:1.6" autocomplete="off"></textarea>
<div id="mdPreview" class="md-preview md-view" style="display:none"></div>
<div style="display:flex;gap:.25rem;padding:.25rem .5rem;border-top:1px solid var(--b);flex-shrink:0">
<button class="btn btn-p btn-s" id="mdEditBtn" onclick="toggleMdMode()" style="font-size:.68rem">&#9998; Edit</button>
<button class="btn btn-o btn-s" id="mdSaveBtn" onclick="saveMdNotes()" style="font-size:.68rem">Save</button>
<span style="flex:1"></span>
<span style="font-size:.65rem;color:var(--t2)">TeX: $$x^2$$ &#10003;</span>
</div></div>

<div id="tabCmtContent" style="flex:1;display:none;flex-direction:column;overflow:hidden">
<div class="cmt-section" style="flex:1;display:flex;flex-direction:column">
<div class="cmt-list" id="cmtList" style="flex:1;overflow-y:auto;padding:.5rem .75rem"></div>
<span id="cmtCount" style="padding:0 .75rem;font-size:.65rem;color:var(--t2);flex-shrink:0"></span>
<div class="cmt-inp"><input class="name-inp" id="cmtName" placeholder="Name" autocomplete="off"><input id="cmtText" placeholder="Add comment..." autocomplete="off"><button class="btn btn-p btn-s" onclick="postComment()">Post</button></div>
</div></div>
</div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script>
var PAPERS=[],selectedId=null,chatMsgs=[],cfg={base_url:'',api_key:'',model:'deepseek-chat'};
var cmtsCache={};
var activeTab='md';

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('on')},4000);
}

async function loadPapers(){
  try{var r=await fetch('/api/papers');PAPERS=await r.json();renderPapers();updateStats()}catch(e){
    document.getElementById('paperList').innerHTML='<div class="ec" style="color:#ef4444">Failed to load papers: '+e.message+'</div>';
  }
}

async function loadConfig(){
  try{var r=await fetch('/api/config');cfg=await r.json();document.getElementById('cfgUrl').value=cfg.base_url||'';
    setModelSelect(cfg.model||'deepseek-chat');
    var saved=localStorage.getItem('litmanager_apikey');
    if(saved){try{cfg.api_key=atob(saved);document.getElementById('cfgKey').value=cfg.api_key}catch(e){}}
    var relay=localStorage.getItem('litmanager_relay');
    if(relay){document.getElementById('cfgRelay').value=relay}
  }catch(e){}
}

function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('litmanager_dark',document.body.classList.contains('dark')?'1':'0')}
if(localStorage.getItem('litmanager_dark')==='1')document.body.classList.add('dark');

function updateStats(){
  if(!PAPERS.length){document.getElementById('statsBar').innerHTML='';return}
  var pdfs=PAPERS.filter(function(p){return p.pdf_downloaded}).length;
  var years=PAPERS.map(function(p){return parseInt(p.year)||0}).filter(function(y){return y>0});
  var yr=years.length?Math.min.apply(null,years)+'-'+Math.max.apply(null,years):'N/A';
  var journals={};PAPERS.forEach(function(p){var j=p.journal||'Unknown';journals[j]=(journals[j]||0)+1});
  var topJ=Object.keys(journals).sort(function(a,b){return journals[b]-journals[a]}).slice(0,2).join(', ');
  var tags={};PAPERS.forEach(function(p){(p.tags||[]).forEach(function(t){tags[t]=(tags[t]||0)+1})});
  var topT=Object.keys(tags).sort(function(a,b){return tags[b]-tags[a]}).slice(0,3).join(', ');
  document.getElementById('statsBar').innerHTML=pdfs+'/'+PAPERS.length+' PDFs | '+yr+' | '+topJ+' | '+topT;
}

function toggleBatch(){var p=document.getElementById('batchPanel');p.style.display=p.style.display==='none'?'block':'none'}

async function batchImport(){
  var txt=document.getElementById('batchInput').value.trim();if(!txt)return;
  var urls=txt.split('\n').filter(function(l){return l.trim()});
  toast('Importing '+urls.length+' papers...');var ok=0,err=0;
  for(var i=0;i<urls.length;i++){
    try{var r=await fetch('/api/papers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:urls[i].trim()})});var d=await r.json();if(d.ok)ok++;else err++}catch(e){err++}
  }
  toast('Done: '+ok+' added, '+err+' failed');
  document.getElementById('batchInput').value='';document.getElementById('batchPanel').style.display='none';
  await loadPapers();
}

function renderPapers(){
  var q=(document.getElementById('searchBox').value||'').toLowerCase();
  var sortBy=document.getElementById('sortBy').value;
  var list=document.getElementById('paperList');if(!list)return;
  var filtered=PAPERS.slice();
  if(q){filtered=filtered.filter(function(p){var h=[p.title,p.journal,(p.authors||[]).join(' '),(p.tags||[]).join(' '),p.doi||'',p.notes||'',p.abstract||''].join(' ').toLowerCase();return h.indexOf(q)>=0})}
  var sortMap={
    'added':function(a,b){return (b.added||'')>(a.added||'')?1:-1},
    'added-asc':function(a,b){return (a.added||'')>(b.added||'')?1:-1},
    'year':function(a,b){return (parseInt(b.year)||0)-(parseInt(a.year)||0)},
    'year-asc':function(a,b){return (parseInt(a.year)||0)-(parseInt(b.year)||0)},
    'title':function(a,b){return (a.title||'').localeCompare(b.title||'')},
    'title-desc':function(a,b){return (b.title||'').localeCompare(a.title||'')},
    'author':function(a,b){var aa=(a.authors||[])[0]||'';var ba=(b.authors||[])[0]||'';return aa.localeCompare(ba)},
    'journal':function(a,b){var ja=a.journal||'';var jb=b.journal||'';var ya=parseInt(a.year)||0;var yb=parseInt(b.year)||0;return ja===jb?yb-ya:ja.localeCompare(jb)}
  };
  if(sortMap[sortBy])filtered.sort(sortMap[sortBy]);
  if(!filtered.length){list.innerHTML='<div class="ec">No papers found</div>';return}
  var html='';

function renderFullMd(txt){
  var s=esc(txt);
  // Code blocks first
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,function(_,lang,code){return'<pre><code>'+escDirect(code)+'</code></pre>'});
  // Inline code
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  // Bold / italic
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // Headers
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  s=s.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  s=s.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // Blockquote
  s=s.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  // Tables
  s=s.replace(/^\|(.+)\|$/gm,function(line){
    var cells=line.split('|').filter(function(c){return c.trim()});
    if(/^[-:\s]+$/.test(cells.join('')))return'';
    var tag=/^[-:\s]+$/.test(cells.join(''))?'th':'td';
    return'<tr>'+cells.map(function(c){return'<'+tag+'>'+c.trim()+'</'+tag+'>'}).join('')+'</tr>';
  });
  // Horizontal rule
  s=s.replace(/^---+$/gm,'<hr>');
  // Line breaks
  s=s.replace(/\n\n/g,'</p><p>');
  s=s.replace(/\n/g,'<br>');
  return'<p>'+s+'</p>'.replace(/<p>\s*<\/p>/g,'');
}

function escDirect(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function getRelayUrl(){return localStorage.getItem('litmanager_relay')||''}
async function loadComments(doi){
  if(!doi){document.getElementById('cmtList').innerHTML='<div style="color:var(--t2);font-size:.75rem">No DOI</div>';return}
  var relay=getRelayUrl();
  var local=[];
  try{var r=await fetch('/api/comments?doi='+encodeURIComponent(doi));local=await r.json()}catch(e){}
  cmtsCache[doi]=local;
  if(relay){
    try{
      var rr=await fetch(relay.replace(/\/$/,'')+'/comments?doi='+encodeURIComponent(doi));
      var remote=await rr.json();
      var seen={};
      for(var i=0;i<local.length;i++)seen[local[i].id]=true;
      for(var j=0;j<remote.length;j++){if(!seen[remote[j].id])local.push(remote[j])}
      cmtsCache[doi]=local;
    }catch(e){}
  }
  renderComments(local);
}

function renderComments(comments){
  var el=document.getElementById('cmtList');
  var count=document.getElementById('cmtCount');
  count.textContent=comments.length?'('+comments.length+')':'';
  if(!comments.length){el.innerHTML='<div style="color:var(--t2);font-size:.75rem">No comments yet.</div>';return}
  var html='';
  for(var i=0;i<comments.length;i++){
    var c=comments[i];
    var verified=c.sig?' &#10003;':'';
    html+='<div class="cmt"><span class="cmt-author">'+esc(c.author||'Anonymous')+verified+'</span><span class="cmt-time">'+c.time+'</span><div class="cmt-text">'+esc(c.text)+'</div></div>';
  }
  el.innerHTML=html;
  el.scrollTop=el.scrollHeight;
}

async function postComment(){
  var p=getPaper(selectedId);if(!p||!p.doi){toast('No DOI for this paper');return}
  var author=document.getElementById('cmtName').value.trim()||'Anonymous';
  var text=document.getElementById('cmtText').value.trim();if(!text)return;
  var d;
  try{
    var r=await fetch('/api/comments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({doi:p.doi,author:author,text:text})});
    d=await r.json();
  }catch(e){toast('Failed: '+e.message);return}
  if(!d.ok){toast('Error: '+d.error);return}
  document.getElementById('cmtText').value='';
  var localList=d.comments;
  var newComment=localList[localList.length-1];
  var relay=getRelayUrl();
  if(relay){
    try{
      var sr=await fetch('/api/sign-comment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(newComment)});
      var signed=await sr.json();
      if(signed.ok){
        var rr=await fetch(relay.replace(/\/$/,'')+'/comments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(signed.comment)});
        var rd=await rr.json();
        if(rd.ok){cmtsCache[p.doi]=rd.comments;renderComments(rd.comments);toast('Posted to relay!');return}
      }
    }catch(e){}
  }
  cmtsCache[p.doi]=localList;
  renderComments(localList);
}

  var orig=btn.innerHTML;btn.disabled=true;btn.innerHTML='<span class="spin" style="border-top-color:var(--a);border-color:rgba(0,0,0,.15)"></span>';
  try{
    var r=await fetch('/api/list-models',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({base_url:base_url,api_key:api_key})});
    var d=await r.json();
    if(d.ok&&d.models.length){
      var sel=document.getElementById('cfgModel');sel.innerHTML='';
      for(var i=0;i<d.models.length;i++){var m=d.models[i];var opt=document.createElement('option');opt.value=m;opt.textContent=m;sel.appendChild(opt)}
      setModelSelect(cfg.model||d.models[0]);
      toast('Found '+d.models.length+' models'+(d.from_api?'':' (preset)')+'. Select one and Save.');
    }else{toast('Could not fetch models: '+(d.error||'No models returned'))}
  }catch(e){toast('Failed: '+e.message)}
  btn.disabled=false;btn.innerHTML=orig;
}
async function saveConfig(){var base_url=document.getElementById('cfgUrl').value.trim();var api_key=document.getElementById('cfgKey').value.trim();var sel=document.getElementById('cfgModel');var model=sel.options[sel.selectedIndex].value||'deepseek-chat';var relay=document.getElementById('cfgRelay').value.trim();
localStorage.setItem('litmanager_relay',relay);
try{var r=await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({base_url:base_url,api_key:api_key,model:model})});var d=await r.json();if(d.ok){cfg=d.config;cfg.api_key=api_key;localStorage.setItem('litmanager_apikey',btoa(api_key));document.getElementById('configPanel').style.display='none';toast('API config saved')}else toast('Error: '+d.error)}catch(e){toast('Failed: '+e.message)}}

  {name:'Rose',bg:'#faf0f5',p:'#ffffff',t:'#3a1a2e',t2:'#996677',a:'#c2185b',a2:'#e91e63',b:'#f5d5e5',h:'#fae8f0',dkbg:'#3a1a2e',dkp:'#4a2535',dkt:'#f0dde5',dkt2:'#c98899',dka:'#e91e63',dka2:'#f06292',dkb:'#553545',dkh:'#452835'},
  {name:'Mono',bg:'#f5f5f5',p:'#ffffff',t:'#121212',t2:'#757575',a:'#424242',a2:'#616161',b:'#e0e0e0',h:'#eeeeee',dkbg:'#121212',dkp:'#1e1e1e',dkt:'#e0e0e0',dkt2:'#9e9e9e',dka:'#9e9e9e',dka2:'#bdbdbd',dkb:'#333333',dkh:'#252525'},
  {name:'Sunset',bg:'#fef8f0',p:'#ffffff',t:'#3a2010',t2:'#996644',a:'#e67e22',a2:'#f39c12',b:'#fdebd0',h:'#fef5e7',dkbg:'#3a2010',dkp:'#4a3020',dkt:'#fdecd5',dkt2:'#c99566',dka:'#f39c12',dka2:'#f1c40f',dkb:'#554030',dkh:'#453020'},
];
function loadTheme(){var raw=localStorage.getItem('litmanager_theme');var t=THEME_PRESETS[0];if(raw){try{var custom=JSON.parse(raw);if(custom.custom){t=custom}else if(custom.name){t=custom}}catch(e){}}return t}
function saveTheme(t){localStorage.setItem('litmanager_theme',JSON.stringify(t))}
function applyThemeVars(t,dark){
  var r=document.documentElement;
  if(dark){r.style.setProperty('--bg',t.dkbg);r.style.setProperty('--p',t.dkp);r.style.setProperty('--t',t.dkt);r.style.setProperty('--t2',t.dkt2);r.style.setProperty('--a',t.dka);r.style.setProperty('--a2',t.dka2);r.style.setProperty('--b',t.dkb);r.style.setProperty('--h',t.dkh)}
  else{r.style.setProperty('--bg',t.bg);r.style.setProperty('--p',t.p);r.style.setProperty('--t',t.t);r.style.setProperty('--t2',t.t2);r.style.setProperty('--a',t.a);r.style.setProperty('--a2',t.a2);r.style.setProperty('--b',t.b);r.style.setProperty('--h',t.h)}
  var acc=document.getElementById('tAccent');if(acc&&acc.dataset.set==='1'){var cl=acc.value;r.style.setProperty('--a',cl);r.style.setProperty('--a2',cl)}
}
function applyTheme(){var t=loadTheme();var dark=document.body.classList.contains('dark');applyThemeVars(t,dark);applyBgOverlay()}
function applyBgOverlay(){
  var op=document.getElementById('tOpacity');var bl=document.getElementById('tBlur');var bgUrl=document.getElementById('tBgUrl');var overlay=document.getElementById('bgOverlay');
  var v=document.getElementById('tOpacityVal');var b=document.getElementById('tBlurVal');
  if(op)v.textContent=op.value+'%';if(bl)b.textContent=bl.value+'px';
  var o=(parseInt(op&&op.value||100)/100).toFixed(2);var blur=parseInt(bl&&bl.value||0);
  if(o<1||blur>0){overlay.style.display='block';overlay.style.background='rgba(255,255,255,'+(1-o)+')';overlay.style.backdropFilter='blur('+blur+'px)'}else{overlay.style.display='none'}
  if(bgUrl&&bgUrl.value.trim()){var url=bgUrl.value.trim();if(/\.(mp4|webm|ogg)$/i.test(url))setBgVideo(url);else setBgImage(url)}else clearBg()
}
function setBgImage(url){clearBgVideo();document.body.style.backgroundImage='url('+url+')';document.body.style.backgroundSize='cover';document.body.style.backgroundPosition='center';document.body.style.backgroundAttachment='fixed'}
function setBgVideo(url){var v=document.getElementById('bgVideo');v.src=url;v.loop=true;v.muted=true;v.autoplay=true;v.playsInline=true;v.style.display='block';try{v.play()}catch(e){};document.body.style.backgroundImage='none'}
function clearBgVideo(){var v=document.getElementById('bgVideo');v.pause();v.src='';v.style.display='none'}
function clearBg(){clearBgVideo();document.body.style.backgroundImage=''}
function loadBgFile(){var f=document.getElementById('tBgFile').files[0];if(!f)return;var url=URL.createObjectURL(f);document.getElementById('tBgUrl').value=url;applyTheme()}
function toggleTheme(){var p=document.getElementById('themePanel');p.style.display=p.style.display==='none'?'block':'none';if(p.style.display==='block')renderThemePresets()}
function renderThemePresets(){var wrap=document.getElementById('themePresets');var t=loadTheme();var html='';for(var i=0;i<THEME_PRESETS.length;i++){var pr=THEME_PRESETS[i];var on=(pr.name===t.name&&!t.custom)?' on':'';html+='<span class="theme-preset'+on+'" style="background:'+pr.a+'" title="'+pr.name+'" onclick="pickPreset('+i+')"></span>'}wrap.innerHTML=html}
function pickPreset(idx){var t=THEME_PRESETS[idx];t.custom=false;saveTheme(t);document.getElementById('tAccent').dataset.set='0';document.getElementById('tAccent').value=t.a;document.getElementById('tBgUrl').value='';applyTheme();renderThemePresets();saveBgSettings()}
function saveBgSettings(){var s={bgUrl:document.getElementById('tBgUrl').value,opacity:document.getElementById('tOpacity').value,blur:document.getElementById('tBlur').value,accent:document.getElementById('tAccent').value,accentSet:document.getElementById('tAccent').dataset.set};localStorage.setItem('litmanager_bg',JSON.stringify(s))}
function loadBgSettings(){var raw=localStorage.getItem('litmanager_bg');if(!raw)return;try{var s=JSON.parse(raw);if(s.bgUrl)document.getElementById('tBgUrl').value=s.bgUrl;if(s.opacity)document.getElementById('tOpacity').value=s.opacity;if(s.blur)document.getElementById('tBlur').value=s.blur;if(s.accent)document.getElementById('tAccent').value=s.accent;if(s.accentSet)document.getElementById('tAccent').dataset.set=s.accentSet;applyTheme()}catch(e){}}
document.getElementById('tAccent').addEventListener('input',function(){this.dataset.set='1';applyTheme();saveBgSettings()});
document.getElementById('tOpacity').addEventListener('input',function(){saveBgSettings()});
document.getElementById('tBlur').addEventListener('input',function(){saveBgSettings()});
var _origToggleDark=toggleDark;
toggleDark=function(){_origToggleDark();applyTheme()};
(function(){applyTheme();renderThemePresets();loadBgSettings()})();

// === Drag handles ===
(function(){
  var gripL=document.getElementById('gripL'),gripR=document.getElementById('gripR');
  var left=document.getElementById('left'),right=document.getElementById('right');
  var dragging=null,startX=0,startW=0,target=null;
  function onDown(e){dragging=e.target;target=e.target===gripL?left:right;startX=e.clientX;startW=target.offsetWidth;dragging.classList.add('on');document.body.style.cursor='col-resize';e.preventDefault()}
  function onMove(e){if(!dragging)return;var dx=e.clientX-startX;var newW=target===left?startW+dx:startW-dx;newW=Math.max(200,Math.min(newW,window.innerWidth*0.55));target.style.width=newW+'px'}
  function onUp(){if(!dragging)return;dragging.classList.remove('on');document.body.style.cursor='';dragging=null;target=null}
  gripL.addEventListener('mousedown',onDown);gripR.addEventListener('mousedown',onDown);
  document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
})();
